<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Borgarlínan map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#1a73e8; --blue-d:#1967d2; --trunk:#007ab8;
    --ink:#202124; --sec:#5f6368; --line:#dadce0; --hov:#f1f3f4; --bg:#fff;
    --shadow:0 1px 3px rgba(60,64,67,.3),0 4px 8px 3px rgba(60,64,67,.15);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;font-family:Roboto,Arial,sans-serif;color:var(--ink);}
  #app{display:flex;height:100%;}
  /* ---- left directions pane (Google places it on the left) ---- */
  #pane{width:408px;min-width:408px;height:100%;background:var(--bg);
        display:flex;flex-direction:column;box-shadow:var(--shadow);z-index:1000;}
  #map{flex:1;}
  .topbar{background:var(--blue);color:#fff;padding:10px 12px 0;position:relative;}
  .gh{position:absolute;top:8px;right:10px;color:#fff;opacity:.7;display:flex;}
  .gh:hover{opacity:1;}
  .gh svg{width:20px;height:20px;fill:currentColor;}
  .modes{display:flex;gap:1px;padding-right:24px;}
  .mode{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
        padding:8px 1px;cursor:pointer;border-bottom:3px solid transparent;
        color:#d2e3fc;font-size:11px;border-radius:8px 8px 0 0;white-space:nowrap;}
  .mode svg{width:18px;height:18px;fill:currentColor;}
  .mode .mt{font-size:10px;font-weight:700;min-height:12px;line-height:1;}
  .mode.active{color:#fff;border-bottom-color:#fff;}
  .mode:hover:not(.active){background:rgba(255,255,255,.12);}
  /* origin/destination box */
  .dirbox{display:flex;align-items:stretch;gap:8px;padding:14px 14px 10px;}
  .conn{display:flex;flex-direction:column;align-items:center;width:14px;padding:6px 0;}
  .conn .o{width:11px;height:11px;border-radius:50%;border:2px solid #9aa0a6;background:#fff;}
  .conn .d{width:13px;height:13px;color:#ea4335;}
  .conn .l{flex:1;width:0;border-left:2px dotted #9aa0a6;margin:3px 0;}
  .fields{flex:1;display:flex;flex-direction:column;gap:8px;}
  .field{position:relative;}
  .field input{width:100%;border:1px solid var(--line);border-radius:8px;
        padding:9px 12px;font-size:14px;font-family:inherit;background:#fff;}
  .field input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 1px var(--blue);}
  .swap{align-self:center;border:none;background:#fff;color:var(--sec);cursor:pointer;
        width:32px;height:32px;border-radius:50%;font-size:17px;}
  .swap:hover{background:var(--hov);}
  .sug{position:absolute;left:0;right:0;top:42px;z-index:1200;background:#fff;
       border-radius:8px;box-shadow:var(--shadow);overflow:hidden;display:none;}
  .sug.open{display:block;}
  .sug div{padding:9px 12px;font-size:13px;cursor:pointer;display:flex;gap:8px;align-items:center;}
  .sug div:hover{background:var(--hov);}
  .sug div::before{content:"";width:14px;height:14px;flex:none;
       background:no-repeat center/contain url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%235f6368"><path d="M12 2C8.1 2 5 5.1 5 9c0 5.2 7 13 7 13s7-7.8 7-13c0-3.9-3.1-7-7-7zm0 9.5A2.5 2.5 0 1112 6a2.5 2.5 0 010 5.5z"/></svg>');}
  /* options row */
  .opts{display:flex;align-items:center;gap:8px;padding:4px 16px 12px;color:var(--sec);font-size:13px;}
  .opts svg{width:18px;height:18px;fill:var(--sec);flex:none;}
  .opts select,.opts input{border:1px solid var(--line);border-radius:6px;padding:6px 8px;
        font-size:13px;font-family:inherit;color:var(--ink);background:#fff;}
  .opts select:focus,.opts input:focus{outline:none;border-color:var(--blue);}
  .opts .ttoggle{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);
        background:#fff;color:var(--sec);border-radius:14px;padding:5px 11px;font-size:12px;
        font-family:inherit;cursor:pointer;white-space:nowrap;margin-left:auto;}
  .opts .ttoggle:hover{background:var(--hov);}
  .opts .ttoggle.on{background:#fce8e6;border-color:#f3b7b1;color:#c5221f;font-weight:500;}
  .opts .ttoggle .dot{width:8px;height:8px;border-radius:50%;background:#c5221f;}
  .divider{height:1px;background:var(--line);}
  /* results */
  #sheet{flex:1;display:flex;flex-direction:column;min-height:0;}
  .grip{display:none;}
  #results{overflow:auto;flex:1;}
  .it{padding:14px 16px;border-bottom:1px solid var(--line);cursor:pointer;border-left:4px solid transparent;}
  .it:hover{background:var(--hov);}
  .it.sel{border-left-color:var(--blue);background:#e8f0fe;}
  .it .legs{display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
  .chip{display:inline-flex;align-items:center;gap:4px;font-size:13px;font-weight:500;
        padding:3px 9px;border-radius:13px;color:#fff;}
  .chip.trunk{background:var(--trunk);} .chip.bus{background:#1a73e8;}
  .chip.walk{background:#f1f3f4;color:#5f6368;padding:3px 7px;}
  .chip.car{background:#e6f4ea;color:#137333;}
  .chip.bike{background:#fde7d3;color:#b5560a;}
  .chip svg{width:14px;height:14px;fill:currentColor;}
  .arrow{color:#9aa0a6;font-size:12px;}
  .it .row{display:flex;justify-content:space-between;align-items:baseline;}
  .it .dur{font-size:18px;font-weight:500;color:var(--ink);}
  .it .dur.alt{color:var(--blue);}
  .it .tdelay{color:#c5221f;font-weight:500;}       /* "+X mín umferð" note */
  .mode .mt.tjam{color:#ffd5cd;}                    /* tint the tab when traffic slows it */
  .it .span{font-size:13px;color:var(--sec);}
  .it .sub{font-size:12px;color:var(--sec);margin-top:2px;}
  .it .badge{font-size:11px;font-weight:500;color:var(--blue);border:1px solid var(--blue);
        border-radius:4px;padding:0 5px;margin-left:8px;vertical-align:middle;}
  .msg{padding:18px 16px;color:var(--sec);font-size:13px;}
  .err{color:#d93025;}
  .leaflet-container{font:inherit;}

  /* ---- mobile: full-screen map, controls on top, results bottom sheet ---- */
  @media (max-width:700px){
    #app{display:block;}
    #map{position:fixed;inset:0;z-index:0;}
    #pane{position:fixed;inset:0;width:auto;min-width:0;background:transparent;
          box-shadow:none;flex-direction:column;pointer-events:none;}
    .controls{pointer-events:auto;background:#fff;box-shadow:var(--shadow);
              border-radius:0 0 14px 14px;}
    .controls input,.opts select,.opts input{font-size:16px;} /* avoid iOS zoom-on-focus */
    .dirbox{padding:12px 12px 8px;} .opts{padding:2px 14px 10px;}

    /* draggable bottom sheet: peek / mid / full, set by JS via translateY */
    #sheet{pointer-events:auto;position:fixed;left:0;right:0;bottom:0;height:88vh;
           background:#fff;border-radius:16px 16px 0 0;box-shadow:0 -2px 12px rgba(60,64,67,.25);
           display:flex;flex-direction:column;z-index:1100;
           transform:translateY(40vh);transition:transform .28s cubic-bezier(.4,0,.2,1);}
    #sheet.dragging{transition:none;}
    .grip{display:block;flex:none;height:26px;position:relative;cursor:grab;touch-action:none;}
    .grip:active{cursor:grabbing;}
    .grip::before{content:"";position:absolute;top:10px;left:50%;transform:translateX(-50%);
           width:40px;height:5px;border-radius:3px;background:#c4c7c5;}
    #results{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
    .sug{max-height:40vh;overflow:auto;}
    .leaflet-control-zoom{display:none;}            /* pinch to zoom on touch */
    .leaflet-control-attribution{display:none;}
  }
</style>
</head>
<body>
<div id="app">
  <div id="pane">
    <div class="controls">
    <div class="topbar">
      <a class="gh" href="https://github.com/hauxir/borgarlinan-map" target="_blank" rel="noopener" title="Kóði á GitHub">
        <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.6 7.6 0 012-.27c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      </a>
      <div class="modes">
        <div class="mode active" data-mode="TRANSIT" title="Borgarlínan">
          <svg viewBox="0 0 24 24"><path d="M12 2c-4 0-8 .5-8 4v9.5A3.5 3.5 0 007.5 19L6 20.5v.5h12v-.5L16.5 19a3.5 3.5 0 003.5-3.5V6c0-3.5-4-4-8-4zM7.5 17A1.5 1.5 0 119 15.5 1.5 1.5 0 017.5 17zm3.5-7H6V6h5zm2 0V6h5v4zm3.5 7a1.5 1.5 0 111.5-1.5 1.5 1.5 0 01-1.5 1.5z"/></svg>
          Borgarlínan
          <span class="mt"></span>
        </div>
        <div class="mode" data-mode="STRAETO" title="Strætó í dag">
          <svg viewBox="0 0 36 36" fill="none"><path d="M18 36C27.9411 36 36 27.9411 36 18C36 8.05887 27.9411 0 18 0C8.05887 0 0 8.05887 0 18C0 27.9411 8.05887 36 18 36Z" fill="#D22328"/><path d="M22.3199 16.2056C18.2159 14.7935 14.5804 14.1939 14.6141 12.2642C14.6384 10.8706 15.9911 10.1435 17.814 10.1753C20.0117 10.2137 21.2831 11.0933 21.463 13.0808L27.1014 12.5894C26.8096 7.8128 22.9923 5.33285 17.9001 5.24402C13.0761 5.15978 9.05898 7.98506 8.98689 12.1124C8.92236 15.8114 11.1933 17.888 13.3744 18.784C14.5534 19.2682 16.995 20.2413 18.7009 20.8072C20.513 21.4282 22.1127 21.9391 22.0865 23.44C22.0579 25.077 20.062 25.7638 18.1324 25.7301C15.5595 25.6852 14.0775 24.587 13.6864 22.4355L8.10156 22.9278C8.71041 27.9785 12.4609 30.6714 18.2593 30.7724C23.4582 30.863 27.6491 27.3182 27.7235 23.0557C27.7904 19.1965 25.2179 17.2358 22.3199 16.2056Z" fill="#FFC80A"/></svg>
          Strætó
          <span class="mt"></span>
        </div>
        <div class="mode" data-mode="BICYCLE" title="Hjólandi">
          <svg viewBox="0 0 24 24"><path d="M15.5 5.5c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM5 12c-2.8 0-5 2.2-5 5s2.2 5 5 5 5-2.2 5-5-2.2-5-5-5zm0 8.5c-1.9 0-3.5-1.6-3.5-3.5s1.6-3.5 3.5-3.5 3.5 1.6 3.5 3.5-1.6 3.5-3.5 3.5zm5.8-10l2.4-2.4.8.8c1.3 1.3 3 2.1 5.1 2.1V9c-1.5 0-2.7-.6-3.6-1.5l-1.9-1.9c-.5-.4-1-.6-1.6-.6s-1.1.2-1.4.6L7.8 8.4c-.4.4-.6.9-.6 1.6 0 .6.2 1.1.6 1.4L11 14v5h2v-6.2l-2.2-2.3zM19 12c-2.8 0-5 2.2-5 5s2.2 5 5 5 5-2.2 5-5-2.2-5-5-5zm0 8.5c-1.9 0-3.5-1.6-3.5-3.5s1.6-3.5 3.5-3.5 3.5 1.6 3.5 3.5-1.6 3.5-3.5 3.5z"/></svg>
          Hjólandi
          <span class="mt"></span>
        </div>
        <div class="mode" data-mode="CAR" title="Keyrandi">
          <svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg>
          Keyrandi
          <span class="mt"></span>
        </div>
        <div class="mode" data-mode="WALK" title="Gangandi">
          <svg viewBox="0 0 24 24"><path d="M13.5 5.5a2 2 0 102-2 2 2 0 00-2 2zM9.8 8.9L7 23h2.1l1.8-8 2.1 2v6h2v-7.5l-2.1-2 .6-3A7 7 0 0019 13v-2a5 5 0 01-4.2-2.4l-1-1.6c-.4-.6-1-1-1.8-1-.3 0-.5.1-.8.1L6 6.3V11h2V7.6l1.8-.7"/></svg>
          Gangandi
          <span class="mt"></span>
        </div>
      </div>
    </div>

    <div class="dirbox">
      <div class="conn">
        <span class="o"></span>
        <span class="l"></span>
        <svg class="d" viewBox="0 0 24 24" fill="#ea4335"><path d="M12 2C8.1 2 5 5.1 5 9c0 5.2 7 13 7 13s7-7.8 7-13c0-3.9-3.1-7-7-7z"/></svg>
      </div>
      <div class="fields">
        <div class="field"><input id="fromq" placeholder="Veldu upphafsstað eða smelltu á kortið" autocomplete="off"><div class="sug" id="fromsug"></div></div>
        <div class="field"><input id="toq" placeholder="Veldu áfangastað" autocomplete="off"><div class="sug" id="tosug"></div></div>
      </div>
      <button class="swap" id="swap" title="Snúa við">⇅</button>
    </div>

    <div class="opts">
      <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1010 10A10 10 0 0012 2zm1 11h-5v-2h3V7h2z"/></svg>
      <select id="day">
        <option value="2026-06-03">Virkur dagur</option>
        <option value="2026-06-06">Laugardagur</option>
        <option value="2026-06-07">Sunnudagur</option>
      </select>
      <span>kl.</span>
      <input id="time" type="time" value="08:00">
      <button id="traffic" class="ttoggle on" title="Herma dæmigerða háannatíma-umferð fyrir Strætó og bíl (Borgarlínan er á sérakreinum og er óbreytt)">
        <span class="dot"></span>Umferð</button>
    </div>
    <div class="divider"></div>
    </div><!-- /controls -->
    <div id="sheet">
      <div class="grip" id="grip"></div>
      <div id="results"><div class="msg">Sláðu inn upphafsstað og áfangastað til að sjá leiðir á fyrirhugaðri Borgarlínu.</div></div>
    </div>
  </div>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// API is same-origin (served by the same server that proxies OTP). Override with ?otp=HOST.
const OTP_HOST = new URLSearchParams(location.search).get('otp')
  || (location.protocol.startsWith('http') ? location.origin : 'https://otp.borgarlinan.kosmi.dev');
const OTP = OTP_HOST + "/otp/routers/default/index/graphql";              // proposed Borgarlína
const OTP_TODAY = OTP_HOST + "/otp-today/routers/default/index/graphql";  // current Strætó
const otpFor = m => m==='STRAETO' ? OTP_TODAY : OTP;
const TRUNK = new Set("ABCDEFG".split(""));

const map = L.map('map',{zoomControl:true}).setView([64.115,-21.90],12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
  {attribution:'© OpenStreetMap, © CARTO',maxZoom:20}).addTo(map);
addEventListener('resize',()=>map.invalidateSize());
setTimeout(()=>map.invalidateSize(),200);

const $=id=>document.getElementById(id);
const fromq=$('fromq'),toq=$('toq'),fromsug=$('fromsug'),tosug=$('tosug'),results=$('results');
let A=null,B=null,mA=null,mB=null,mode='TRANSIT',routeLayer=L.layerGroup().addTo(map),currentIts=[];
let trafficOn=true, RF={}, FIELD={cell:[0.0018,0.0041],buckets:[],g:{}};   // "Umferð" toggle + congestion tables
fetch('/traffic-factors').then(r=>r.json()).then(d=>{RF=d; if(A&&B)maybePlan();}).catch(()=>{});
fetch('/traffic-field').then(r=>r.json()).then(d=>{if(d&&d.g)FIELD=d; if(A&&B)maybePlan();}).catch(()=>{});

// ---- mobile bottom sheet: drag the grip to snap peek / mid / full -----------
const isMobile=()=>matchMedia('(max-width:700px)').matches;
const sheet=$('sheet'), grip=$('grip');
let snapY={full:0,mid:0,peek:0}, sheetState='peek', dragging=false, startY=0, startTy=0, moved=false;
function calcSnaps(){const vh=innerHeight;
  snapY={ full:Math.round(vh*0.04), mid:Math.round(vh*0.42), peek:Math.round(vh*0.88-104) };}
function applySheet(){ sheet.style.transform = isMobile() ? `translateY(${snapY[sheetState]}px)` : ''; }
function snapTo(state){ sheetState=state; applySheet(); }
const curTy=()=>{const m=/translateY\(([-\d.]+)px\)/.exec(sheet.style.transform);return m?parseFloat(m[1]):snapY[sheetState];};
calcSnaps(); applySheet();
addEventListener('resize',()=>{ calcSnaps(); if(!dragging) applySheet(); });
grip.addEventListener('pointerdown',e=>{ if(!isMobile())return;
  dragging=true; moved=false; startY=e.clientY; startTy=curTy();
  sheet.classList.add('dragging'); grip.setPointerCapture(e.pointerId); });
grip.addEventListener('pointermove',e=>{ if(!dragging)return;
  if(Math.abs(e.clientY-startY)>4) moved=true;
  const ty=Math.max(snapY.full,Math.min(snapY.peek,startTy+(e.clientY-startY)));
  sheet.style.transform=`translateY(${ty}px)`; });
function endDrag(){ if(!dragging)return; dragging=false; sheet.classList.remove('dragging');
  if(!moved){ snapTo(sheetState==='peek'?'mid':'peek'); return; }   // tap toggles peek/mid
  const ty=curTy(); let best='mid',bd=1e9;
  for(const s in snapY){ const d=Math.abs(ty-snapY[s]); if(d<bd){bd=d;best=s;} }
  snapTo(best); }
grip.addEventListener('pointerup',endDrag); grip.addEventListener('pointercancel',endDrag);

// ---- Google-ish markers: origin ring, destination red pin -------------------
const originIcon=L.divIcon({className:'',iconSize:[18,18],iconAnchor:[9,9],
  html:'<div style="width:16px;height:16px;border-radius:50%;background:#fff;border:4px solid #1a73e8;box-shadow:0 1px 3px rgba(0,0,0,.4)"></div>'});
const destIcon=L.divIcon({className:'',iconSize:[28,40],iconAnchor:[14,38],
  html:'<svg width="28" height="40" viewBox="0 0 24 36"><path fill="#ea4335" stroke="#b31412" stroke-width=".5" d="M12 0C5.4 0 0 5.4 0 12c0 9 12 24 12 24s12-15 12-24C24 5.4 18.6 0 12 0z"/><circle cx="12" cy="12" r="4.5" fill="#fff"/></svg>'});

const coord=ll=>`${ll.lat.toFixed(5)}, ${ll.lng.toFixed(5)}`;
const maybePlan=()=>{ if(A&&B){ plan(); modeTimes(); } };
function setA(ll,label){A=ll; if(mA)map.removeLayer(mA); mA=L.marker(ll,{icon:originIcon,zIndexOffset:500}).addTo(map);
  if(label!==undefined)fromq.value=label; updateHash(); maybePlan();}
function setB(ll,label){B=ll; if(mB)map.removeLayer(mB); mB=L.marker(ll,{icon:destIcon,zIndexOffset:600}).addTo(map);
  if(label!==undefined)toq.value=label; updateHash(); maybePlan();}

map.on('click',e=>{
  if(!A||(A&&B)){ if(mB){map.removeLayer(mB);mB=null;} B=null; toq.value=''; routeLayer.clearLayers(); results.innerHTML='';
    setA(e.latlng,coord(e.latlng)); }
  else setB(e.latlng,coord(e.latlng));
});

$('swap').onclick=()=>{
  if(!A&&!B) return;
  [A,B]=[B,A]; const fv=fromq.value; fromq.value=toq.value; toq.value=fv;
  if(mA)map.removeLayer(mA); if(mB)map.removeLayer(mB); mA=mB=null;
  if(A)mA=L.marker(A,{icon:originIcon,zIndexOffset:500}).addTo(map);
  if(B)mB=L.marker(B,{icon:destIcon,zIndexOffset:600}).addTo(map);
  updateHash(); maybePlan();
};
document.querySelectorAll('.mode').forEach(el=>el.onclick=()=>{
  document.querySelectorAll('.mode').forEach(m=>m.classList.remove('active'));
  el.classList.add('active'); mode=el.dataset.mode; maybePlan();
});
['day','time'].forEach(id=>$(id).onchange=()=>{ updateHash(); maybePlan(); });
$('traffic').onclick=()=>{ trafficOn=!trafficOn; $('traffic').classList.toggle('on',trafficOn); updateHash(); maybePlan(); };

// ---- shareable URL (state in the hash) --------------------------------------
function updateHash(){
  const p=new URLSearchParams();
  if(A)p.set('f',`${A.lat.toFixed(5)},${A.lng.toFixed(5)}`);
  if(B)p.set('t',`${B.lat.toFixed(5)},${B.lng.toFixed(5)}`);
  p.set('d',$('day').value); p.set('ti',$('time').value); if(mode!=='TRANSIT')p.set('m',mode);
  if(!trafficOn)p.set('tr','0');
  if(fromq.value)p.set('fl',fromq.value); if(toq.value)p.set('tl',toq.value);
  history.replaceState(null,'',(A||B)?'#'+p.toString():location.pathname+location.search);
}
function loadHash(){
  const h=location.hash.slice(1); if(!h)return;
  const p=new URLSearchParams(h),ll=s=>{const[a,o]=s.split(',').map(Number);return L.latLng(a,o);};
  if(p.get('d'))$('day').value=p.get('d'); if(p.get('ti'))$('time').value=p.get('ti');
  if(p.get('m')){mode=p.get('m'); document.querySelectorAll('.mode').forEach(m=>m.classList.toggle('active',m.dataset.mode===mode));}
  if(p.get('tr')==='0'){trafficOn=false; $('traffic').classList.remove('on');}
  if(p.get('f')){A=ll(p.get('f')); mA=L.marker(A,{icon:originIcon,zIndexOffset:500}).addTo(map); fromq.value=p.get('fl')||coord(A);}
  if(p.get('t')){B=ll(p.get('t')); mB=L.marker(B,{icon:destIcon,zIndexOffset:600}).addTo(map); toq.value=p.get('tl')||coord(B);}
  if(A&&B){map.fitBounds(L.latLngBounds([A,B]).pad(0.4)); plan(); modeTimes();} else if(A||B) map.setView(A||B,13);
}

// ---- address autocomplete (Nominatim, capital region) -----------------------
function geo(input,sugEl,which){
  let t;
  input.addEventListener('input',()=>{clearTimeout(t); const q=input.value.trim();
    if(q.length<3){sugEl.classList.remove('open');return;} t=setTimeout(()=>lookup(q,sugEl,which),350);});
  input.addEventListener('keydown',e=>{ if(e.key==='Enter'){const f=sugEl.querySelector('div'); if(f)f.click();}});
  document.addEventListener('click',e=>{ if(!sugEl.contains(e.target)&&e.target!==input) sugEl.classList.remove('open');});
}
async function lookup(q,sugEl,which){
  const url='https://nominatim.openstreetmap.org/search?format=json&limit=5&countrycodes=is&viewbox=-22.30,64.25,-21.50,63.98&q='+encodeURIComponent(q);
  try{
    const list=await(await fetch(url,{headers:{Accept:'application/json'}})).json();
    sugEl.innerHTML=''; if(!list.length){sugEl.classList.remove('open');return;}
    list.forEach(it=>{const d=document.createElement('div'); d.textContent=it.display_name.replace(/, Ísland$/,'');
      d.onclick=()=>{const p=L.latLng(parseFloat(it.lat),parseFloat(it.lon)); sugEl.classList.remove('open');
        const label=it.display_name.split(',').slice(0,2).join(',').trim();
        (which==='a'?setA:setB)(p,label); map.setView(p,Math.max(map.getZoom(),13));};
      sugEl.appendChild(d);});
    sugEl.classList.add('open');
  }catch(e){sugEl.classList.remove('open');}
}
geo(fromq,fromsug,'a'); geo(toq,tosug,'b');

// ---- routing ----------------------------------------------------------------
const Q=`query($fLat:Float!,$fLon:Float!,$tLat:Float!,$tLon:Float!,$d:String!,$ti:String!,$modes:[TransportMode!]){
  plan(from:{lat:$fLat,lon:$fLon},to:{lat:$tLat,lon:$tLon},date:$d,time:$ti,numItineraries:6,
       transportModes:$modes){
    itineraries{ duration walkDistance numberOfTransfers startTime endTime
      legs{ mode duration distance startTime endTime route{shortName color textColor} trip{directionId} intermediateStops{name lat lon} legGeometry{points} from{name lat lon} to{name lat lon} } } } }`;

// ---- traffic model ----------------------------------------------------------
// Typical-congestion factors inflate current-Strætó in-vehicle legs and the car;
// Borgarlína (dedicated lanes), bike and walk are never in the table -> factor 1.
function bucketFor(date, time){
  const wd=new Date(date+'T12:00:00Z').getUTCDay();    // 0 Sun … 6 Sat
  const h=parseInt((time||'08:00').split(':')[0],10);
  if(wd===6) return (h>=6&&h<22)?'sat':null;
  if(wd===0) return (h>=6&&h<22)?'sun':null;
  if(h>=6&&h<9)   return 'wk_am';
  if(h>=9&&h<15)  return 'wk_mid';
  if(h>=15&&h<18) return 'wk_pm';
  if(h>=18&&h<22) return 'wk_eve';
  return null;                                          // night -> free-flow
}
function nearestStopIdx(stops, lat, lon){     // index of the closest stop (lon scaled by cos lat)
  const cl=Math.cos(lat*Math.PI/180); let bi=0,bd=Infinity;
  for(let k=0;k<stops.length;k++){ const dlat=stops[k][0]-lat, dlon=(stops[k][1]-lon)*cl;
    const d=dlat*dlat+dlon*dlon; if(d<bd){bd=d;bi=k;} }
  return bi;
}
// Per-leg factor at stop-to-stop resolution: match the leg's board/alight stops to
// the route's stop list and length-weight only the gaps actually ridden.
function legFactor(leg, bucket){
  if(!trafficOn||!bucket||!leg.route) return 1;
  const byDir=RF[leg.route.shortName]; if(!byDir) return 1;
  const dir=leg.trip&&leg.trip.directionId;
  const e=byDir[dir!=null?String(dir):'0']||byDir['0']||Object.values(byDir)[0];
  if(!e||!e.f||!e.f[bucket]||!leg.from||!leg.to) return 1;
  const gaps=e.f[bucket];
  let lo=nearestStopIdx(e.s,leg.from.lat,leg.from.lon), hi=nearestStopIdx(e.s,leg.to.lat,leg.to.lon);
  if(hi<lo){const t=lo;lo=hi;hi=t;}
  if(hi<=lo) return gaps[Math.min(lo,gaps.length-1)]||1;   // single-gap / degenerate
  let acc=0,tot=0;
  for(let k=lo;k<hi&&k<gaps.length;k++){ const len=e.s[k+1][2]-e.s[k][2]; if(len>0){acc+=len*gaps[k];tot+=len;} }
  return tot>0?acc/tot:1;
}
function itinExtra(it, bucket){               // extra in-vehicle seconds (no mutation)
  let e=0; (it.legs||[]).forEach(l=>{ if(l.route) e+=l.duration*(legFactor(l, bucket)-1); });
  return e;
}
function applyTrafficItin(it, bucket){        // inflate each transit leg + the totals
  let extra=0;
  it.legs.forEach(l=>{ if(!l.route)return;
    const f=legFactor(l, bucket);
    if(f>1){ const e=l.duration*(f-1); l.duration+=e; extra+=e; } });
  if(extra){ it._ff=it.duration; it.duration+=extra; it.endTime+=extra*1000; }
  return it;
}
// The car is routed free-flow by OTP and inflated by the geographic congestion
// field (committed, no API key). 3×3 cell lookup bridges grid edges.
function fieldAt(lat, lon, bi){
  const latC=FIELD.cell[0], lonC=FIELD.cell[1], il=Math.round(lat/latC), io=Math.round(lon/lonC);
  let best=null, bd=9;
  for(let dl=-1;dl<=1;dl++)for(let dq=-1;dq<=1;dq++){ const v=FIELD.g[(il+dl)+'_'+(io+dq)];
    if(v){ const d=dl*dl+dq*dq; if(d<bd){bd=d;best=v;} } }
  return best?best[bi]:1;
}
function carFactor(encoded, bucket){          // length-weighted field factor over the route
  if(!trafficOn||!bucket) return 1;           // self-gated like legFactor, so the car tab clears when off
  const bi=FIELD.buckets.indexOf(bucket); if(bi<0||!encoded) return 1;
  const pts=decode(encoded); if(pts.length<2) return 1;
  let acc=0,tot=0;
  for(let k=0;k<pts.length-1;k++){ const a=pts[k],b=pts[k+1];
    const len=Math.hypot(b[0]-a[0],(b[1]-a[1])*Math.cos(a[0]*Math.PI/180));
    if(len>0){ acc+=len*fieldAt((a[0]+b[0])/2,(a[1]+b[1])/2,bi); tot+=len; } }
  return tot>0?acc/tot:1;
}
function carExtra(it, bucket){                 // extra car seconds (no mutation)
  let e=0; (it.legs||[]).forEach(l=>{ if(l.mode==='CAR'&&l.legGeometry) e+=l.duration*(carFactor(l.legGeometry.points,bucket)-1); });
  return e;
}
function applyTrafficCar(it, bucket){
  let extra=0;
  it.legs.forEach(l=>{ if(l.mode!=='CAR'||!l.legGeometry)return;
    const f=carFactor(l.legGeometry.points,bucket);
    if(f>1){ const e=l.duration*(f-1); l.duration+=e; extra+=e; } });
  if(extra){ it._ff=it.duration; it.duration+=extra; it.endTime+=extra*1000; }
  return it;
}

async function plan(){
  results.innerHTML='<div class="msg">Leita að leiðum…</div>';
  const modes = mode==='WALK' ? [{mode:'WALK'}] : mode==='CAR' ? [{mode:'CAR'}] : mode==='BICYCLE' ? [{mode:'BICYCLE'}] : [{mode:'WALK'},{mode:'TRANSIT'}];
  const vars={fLat:A.lat,fLon:A.lng,tLat:B.lat,tLon:B.lng,d:$('day').value,ti:$('time').value+":00",modes};
  try{
    const r=await fetch(otpFor(mode),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:Q,variables:vars})});
    const j=await r.json();
    if(j.errors){results.innerHTML='<div class="msg err">'+j.errors[0].message+'</div>';return;}
    let its=j.data.plan.itineraries;
    if(trafficOn){ const b=bucketFor($('day').value,$('time').value);
      if(mode==='STRAETO') its=its.map(it=>applyTrafficItin(it,b));
      else if(mode==='CAR') its=its.map(it=>applyTrafficCar(it,b)); }
    render(its);
  }catch(err){console.warn('plan() failed:',err);
    results.innerHTML='<div class="msg err">Náði ekki sambandi við leiðavélina á '+new URL(OTP).host+'.</div>';}
}

// ---- per-mode travel time shown on each tab (Google-Maps style) -------------
const MODE_DEFS=[['TRANSIT',[{mode:'WALK'},{mode:'TRANSIT'}]],['STRAETO',[{mode:'WALK'},{mode:'TRANSIT'}]],
                 ['BICYCLE',[{mode:'BICYCLE'}]],['CAR',[{mode:'CAR'}]],['WALK',[{mode:'WALK'}]]];
const MTQ=`query($fLat:Float!,$fLon:Float!,$tLat:Float!,$tLon:Float!,$d:String!,$ti:String!,$modes:[TransportMode!]){
  plan(from:{lat:$fLat,lon:$fLon},to:{lat:$tLat,lon:$tLon},date:$d,time:$ti,numItineraries:4,transportModes:$modes){itineraries{duration legs{mode duration route{shortName} trip{directionId} from{lat lon} to{lat lon} legGeometry{points}}}}}`;
const shortMin=s=>{const m=Math.round(s/60);return m<60?m+' mín':Math.floor(m/60)+' klst'+(m%60?' '+(m%60):'');};
let mtSeq=0;
function modeTimes(){
  const seq=++mtSeq;  // a newer trip invalidates older in-flight results
  const b=bucketFor($('day').value,$('time').value);
  MODE_DEFS.forEach(async ([m,modes])=>{
    const el=document.querySelector('.mode[data-mode="'+m+'"] .mt'); if(!el)return; el.textContent='…';
    try{
      const vars={fLat:A.lat,fLon:A.lng,tLat:B.lat,tLon:B.lng,d:$('day').value,ti:$('time').value+":00",modes};
      const j=await (await fetch(otpFor(m),{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({query:MTQ,variables:vars})})).json();
      if(seq!==mtSeq)return;  // stale, a newer request is in flight
      const its=j.data&&j.data.plan&&j.data.plan.itineraries;
      if(!its||!its.length){ el.textContent='–'; return; }
      const base=Math.min(...its.map(i=>i.duration));
      const durs=its.map(i=> i.duration + (m==='STRAETO'?itinExtra(i,b): m==='CAR'?carExtra(i,b):0));  // car + Strætó pay traffic
      const withT=Math.min(...durs);
      el.textContent=shortMin(withT);
      el.classList.toggle('tjam', trafficOn && withT-base>=60);   // tint the tab when traffic adds time
    }catch(e){ if(seq===mtSeq)el.textContent=''; }
  });
}

const TRANSFER_LEEWAY=600; // accept up to 10 min extra to drop a transfer
function rank(its){const fastest=Math.min(...its.map(i=>i.duration));
  return its.slice().sort((a,b)=>{const aIn=a.duration<=fastest+TRANSFER_LEEWAY,bIn=b.duration<=fastest+TRANSFER_LEEWAY;
    if(aIn!==bIn)return aIn?-1:1; if(aIn&&a.numberOfTransfers!==b.numberOfTransfers)return a.numberOfTransfers-b.numberOfTransfers;
    return a.duration-b.duration;});}

const WALKSVG='<svg viewBox="0 0 24 24"><path d="M13.5 5.5a2 2 0 102-2 2 2 0 00-2 2zM9.8 8.9L7 23h2.1l1.8-8 2.1 2v6h2v-7.5l-2.1-2 .6-3A7 7 0 0019 13v-2a5 5 0 01-4.2-2.4l-1-1.6c-.4-.6-1-1-1.8-1-.3 0-.5.1-.8.1L6 6.3V11h2V7.6z"/></svg>';
const BUSSVG='<svg viewBox="0 0 24 24"><path d="M4 16c0 .9.4 1.7 1 2.2V20a1 1 0 001 1h1a1 1 0 001-1v-1h8v1a1 1 0 001 1h1a1 1 0 001-1v-1.8c.6-.5 1-1.3 1-2.2V6c0-3.5-4-4-8-4S4 2.5 4 6zm3.5 1A1.5 1.5 0 119 15.5 1.5 1.5 0 017.5 17zm9 0a1.5 1.5 0 111.5-1.5 1.5 1.5 0 01-1.5 1.5zM18 11H6V6h12z"/></svg>';
const CARSVG='<svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16a1.5 1.5 0 110-3 1.5 1.5 0 010 3zm11 0a1.5 1.5 0 110-3 1.5 1.5 0 010 3zM5 11l1.5-4.5h11L19 11H5z"/></svg>';
const BIKESVG='<svg viewBox="0 0 24 24"><path d="M15.5 5.5a2 2 0 100-4 2 2 0 000 4zM5 12a5 5 0 105 5 5 5 0 00-5-5zm0 8.5A3.5 3.5 0 118.5 17 3.5 3.5 0 015 20.5zm5.8-10l2.4-2.4.8.8c1.3 1.3 3 2.1 5.1 2.1V9c-1.5 0-2.7-.6-3.6-1.5l-1.9-1.9c-.5-.4-1-.6-1.6-.6s-1.1.2-1.4.6L7.8 8.4c-.4.4-.6.9-.6 1.6 0 .6.2 1.1.6 1.4L11 14v5h2v-6.2l-2.2-2.3zM19 12a5 5 0 105 5 5 5 0 00-5-5zm0 8.5a3.5 3.5 0 113.5-3.5 3.5 3.5 0 01-3.5 3.5z"/></svg>';
const fmt=s=>{const m=Math.round(s/60);return m<60?`${m} mín`:`${Math.floor(m/60)} klst ${m%60} mín`;};
const hhmm=ms=>new Date(ms).toLocaleTimeString('is-IS',{hour:'2-digit',minute:'2-digit',hour12:false});
const walkStr=m=>m>=1000?`${(m/1000).toFixed(1).replace('.',',')} km`:`${Math.round(m)} m`;
const xfer=n=>`${n} ${n%10===1&&n%100!==11?'skipting':'skiptingar'}`;
// per-route colours: prefer the official plan colour (GTFS route_color), else trunk/feeder blue
const contrast=h=>{const c=h.replace('#','');const r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16);
  return (0.299*r+0.587*g+0.114*b)/255>0.6?'#202124':'#fff';};
const lineColor=l=>l.route&&l.route.color?'#'+l.route.color:(l.route&&TRUNK.has(l.route.shortName)?'#007ab8':'#1a73e8');
const lineText=l=>l.route&&l.route.textColor?'#'+l.route.textColor:contrast(lineColor(l));

function render(its){
  if(!its||!its.length){results.innerHTML='<div class="msg">Engin leið fannst á þessum tíma. Prófaðu annan brottfarartíma.</div>';return;}
  currentIts=rank(its); const fastest=Math.min(...currentIts.map(i=>i.duration));
  results.innerHTML='';
  currentIts.forEach((it,idx)=>{
    const div=document.createElement('div'); div.className='it'+(idx===0?' sel':''); div.dataset.idx=idx;
    const legs=it.legs.filter(l=>l.mode!=='WALK'||l.duration>30).map(l=>{
      if(l.mode==='WALK')return `<span class="chip walk">${WALKSVG}${Math.round(l.duration/60)}</span>`;
      if(l.mode==='CAR')return `<span class="chip car">${CARSVG}akstur</span>`;
      if(l.mode==='BICYCLE')return `<span class="chip bike">${BIKESVG}hjól</span>`;
      const sn=(l.route&&l.route.shortName)||'?';
      return `<span class="chip" style="background:${lineColor(l)};color:${lineText(l)}">${BUSSVG}${sn}</span>`;
    }).join('<span class="arrow">›</span>');
    const tag=idx===0?'<span class="badge">Mælt með</span>':(it.duration===fastest?'<span class="badge">Fljótast</span>':'');
    const totDist=it.legs.reduce((s,l)=>s+(l.distance||0),0);
    const stops=it.legs.reduce((s,l)=>s+(l.route?((l.intermediateStops?l.intermediateStops.length:0)+1):0),0);
    let sub=mode==='CAR'?`${walkStr(totDist)} akstur`
             :mode==='BICYCLE'?`${walkStr(totDist)} hjólað`
             :`${walkStr(totDist)} · ${xfer(it.numberOfTransfers)} · ${stops} stopp · ${walkStr(it.walkDistance)} gangandi`;
    const delay=it._ff?it.duration-it._ff:0;
    if(delay>=30) sub+=` · <span class="tdelay">+${Math.round(delay/60)} mín umferð</span>`;
    div.innerHTML=`<div class="legs">${legs||'<span class="chip walk">'+WALKSVG+'ganga</span>'}</div>
      <div class="row"><span class="dur ${idx>0&&it.duration===fastest?'alt':''}">${fmt(it.duration)}${tag}</span>
        <span class="span">${hhmm(it.startTime)} – ${hhmm(it.endTime)}</span></div>
      <div class="sub">${sub}</div>`;
    div.onclick=()=>{ select(idx); if(isMobile()) snapTo('peek'); };  // tap a route -> reveal it on the map
    results.appendChild(div);
  });
  if(isMobile()) snapTo('mid');
  select(0);
}

function select(idx){
  document.querySelectorAll('.it').forEach(e=>e.classList.toggle('sel',+e.dataset.idx===idx));
  draw(idx);
}

function decode(str){let i=0,lat=0,lng=0,co=[];
  while(i<str.length){let r,s=0,res=0;
    do{r=str.charCodeAt(i++)-63;res|=(r&0x1f)<<s;s+=5;}while(r>=0x20);
    lat+=(res&1)?~(res>>1):(res>>1);s=0;res=0;
    do{r=str.charCodeAt(i++)-63;res|=(r&0x1f)<<s;s+=5;}while(r>=0x20);
    lng+=(res&1)?~(res>>1):(res>>1);co.push([lat/1e5,lng/1e5]);}
  return co;}

const legPts=l=> l.legGeometry ? decode(l.legGeometry.points) : null;
function draw(sel){
  routeLayer.clearLayers();
  // alternatives in gray, underneath
  currentIts.forEach((it,i)=>{ if(i===sel)return;
    it.legs.forEach(l=>{ const pts=legPts(l); if(!pts)return;
      L.polyline(pts,{color:'#bdc1c6',weight:5,opacity:.8}).addTo(routeLayer);});});
  // selected on top: white casing + colored line; walking dotted
  const it=currentIts[sel],bounds=[];
  it.legs.forEach(l=>{ const pts=legPts(l); if(!pts)return; bounds.push(...pts);
    if(l.mode==='WALK'){
      L.polyline(pts,{color:'#1a73e8',weight:4,opacity:.9,dashArray:'1,9',lineCap:'round'}).addTo(routeLayer);
    }else{
      const c=l.mode==='CAR'?'#137333':l.mode==='BICYCLE'?'#b5560a':lineColor(l);
      L.polyline(pts,{color:'#fff',weight:9,opacity:1}).addTo(routeLayer);
      L.polyline(pts,{color:c,weight:6,opacity:1}).addTo(routeLayer);
    }});
  // transit stops along the selected route: intermediates as small dots, board/alight as bigger rings
  it.legs.forEach(l=>{ if(!l.route)return; const c=lineColor(l);
    (l.intermediateStops||[]).forEach(s=>{ if(s.lat==null)return;
      L.circleMarker([s.lat,s.lon],{radius:3.5,color:'#fff',weight:1.5,fillColor:c,fillOpacity:1})
        .bindTooltip(s.name).addTo(routeLayer);});
    [l.from,l.to].forEach(s=>{ if(!s||s.lat==null)return;
      L.circleMarker([s.lat,s.lon],{radius:5.5,color:c,weight:2.5,fillColor:'#fff',fillOpacity:1})
        .bindTooltip(s.name,{direction:'top'}).addTo(routeLayer);});
  });
  if(bounds.length){
    let pTL=[20,20], pBR=[20,20];
    if(isMobile()){                                    // keep route clear of the top card + bottom sheet
      const ctrlH=document.querySelector('.controls').offsetHeight;
      const vis=Math.max(20, Math.round(innerHeight*0.88 - snapY[sheetState]));  // visible sheet height
      pTL=[20, ctrlH+16]; pBR=[20, vis+16];
    }
    map.fitBounds(L.latLngBounds(bounds).pad(0.18),{paddingTopLeft:pTL,paddingBottomRight:pBR});
  }
}

loadHash();
</script>
